<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>錄音橋接頁</title>
<style>
  :root{
    --ink:#12213B; --surface:#1B2E4D; --paper:#F1EEE6;
    --muted:#93A0B8; --brass:#C9A227; --danger:#C25450; --sage:#4C8B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--ink); color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
    padding:20px; text-align:center;
  }
  h1{font-size:16px; margin:0 0 6px; color:var(--brass);}
  p{font-size:13px; color:var(--muted); margin:0 0 20px; line-height:1.6;}
  .dot{width:64px;height:64px;border-radius:50%;background:var(--surface);border:2px solid var(--brass);
    display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px;}
  .dot.recording{border-color:var(--danger); animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  button{
    width:100%; max-width:280px; padding:14px; margin-top:10px; border:none; border-radius:10px;
    font-size:15px; font-weight:600; cursor:pointer;
  }
  .btn-start{background:var(--brass); color:var(--ink);}
  .btn-stop{background:var(--danger); color:var(--paper);}
  .btn-send{background:var(--sage); color:var(--paper);}
  .btn-retry{background:transparent; color:var(--muted); border:1px solid var(--muted);}
  .status{font-size:12.5px; color:var(--muted); margin-top:14px; min-height:16px;}
  .status.error{color:var(--danger);}
  audio{margin-top:14px; width:100%; max-width:280px;}
  .hidden{display:none;}
</style>
</head>
<body>
  <h1>🎙 錄音橋接頁</h1>
  <p>這個視窗獨立於主頁面，用來取得麥克風權限。<br>錄完音後按「停止並送出」，視窗會自動關閉並把錄音傳回主頁面。</p>

  <div class="dot" id="dot">⏺</div>

  <button class="btn-start" id="startBtn" onclick="startRecording()">開始錄音</button>
  <button class="btn-stop hidden" id="stopBtn" onclick="stopRecording()">停止錄音</button>

  <audio id="preview" class="hidden" controls></audio>
  <button class="btn-send hidden" id="sendBtn" onclick="sendAudio()">✔ 停止並送出</button>
  <button class="btn-retry hidden" id="retryBtn" onclick="resetRecording()">重新錄音</button>

  <div class="status" id="status"></div>

<script>
  let mediaRecorder = null;
  let audioChunks = [];
  let audioBlob = null;
  let stream = null;

  function setStatus(msg, isError){
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  async function startRecording(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(err){
      setStatus('無法取得麥克風權限：' + err.message + '（請確認瀏覽器/系統設定已允許此網站使用麥克風）', true);
      return;
    }
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start();

    document.getElementById('dot').classList.add('recording');
    document.getElementById('startBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
    setStatus('錄音中...');
  }

  function stopRecording(){
    if(mediaRecorder && mediaRecorder.state !== 'inactive'){
      mediaRecorder.stop();
    }
    if(stream){
      stream.getTracks().forEach(t => t.stop());
    }
    document.getElementById('dot').classList.remove('recording');
    document.getElementById('stopBtn').classList.add('hidden');
  }

  function onRecordingStop(){
    audioBlob = new Blob(audioChunks, {type:'audio/webm'});
    const url = URL.createObjectURL(audioBlob);
    const preview = document.getElementById('preview');
    preview.src = url;
    preview.classList.remove('hidden');
    document.getElementById('sendBtn').classList.remove('hidden');
    document.getElementById('retryBtn').classList.remove('hidden');
    setStatus('錄音完成，可以先試聽，確認沒問題後按「停止並送出」');
  }

  function resetRecording(){
    audioBlob = null;
    document.getElementById('preview').classList.add('hidden');
    document.getElementById('sendBtn').classList.add('hidden');
    document.getElementById('retryBtn').classList.add('hidden');
    document.getElementById('startBtn').classList.remove('hidden');
    setStatus('');
  }

  function sendAudio(){
    if(!audioBlob){ setStatus('沒有錄音內容', true); return; }
    setStatus('傳送中...');
    const reader = new FileReader();
    reader.onloadend = () => {
      if(window.opener){
        window.opener.postMessage({
          type: 'AUDIO_CAPTURE_SUCCESS',
          base64DataUrl: reader.result
        }, '*');
      }
      window.close();
    };
    reader.readAsDataURL(audioBlob);
  }

  window.addEventListener('beforeunload', () => {
    if(stream){ stream.getTracks().forEach(t => t.stop()); }
  });
</script>
</body>
</html>
