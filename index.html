<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>錄音橋接頁</title>
<style>
  :root{
    --ink:#12213B; --surface:#1B2E4D; --paper:#F1EEE6;
    --muted:#93A0B8; --brass:#C9A227; --danger:#C25450; --sage:#4C8B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--ink); color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
    padding:20px; text-align:center;
  }
  h1{font-size:16px; margin:0 0 6px; color:var(--brass);}
  p{font-size:13px; color:var(--muted); margin:0 0 20px; line-height:1.6;}
  .dot{width:64px;height:64px;border-radius:50%;background:var(--surface);border:2px solid var(--brass);
    display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px;}
  .dot.recording{border-color:var(--danger); animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  button{
    width:100%; max-width:280px; padding:14px; margin-top:10px; border:none; border-radius:10px;
    font-size:15px; font-weight:600; cursor:pointer;
  }
  .btn-start{background:var(--brass); color:var(--ink);}
  .btn-stop{background:var(--danger); color:var(--paper);}
  .btn-send{background:var(--sage); color:var(--paper);}
  .btn-retry{background:transparent; color:var(--muted); border:1px solid var(--muted);}
  .status{font-size:12.5px; color:var(--muted); margin-top:14px; min-height:16px;}
  .status.error{color:var(--danger);}
  audio{margin-top:14px; width:100%; max-width:280px;}
  .hidden{display:none;}
</style>
</head>
<body>
  <h1>🎙 錄音橋接頁</h1>
  <p>這個視窗獨立於主頁面，用來取得麥克風權限。<br>錄完音後按「停止並送出」，視窗會自動關閉並把錄音傳回主頁面。</p>

  <div class="dot" id="dot">⏺</div>

  <button class="btn-start" id="startBtn" onclick="startRecording()">開始錄音</button>
  <button class="btn-stop hidden" id="stopBtn" onclick="stopRecording()">停止錄音</button>

  <audio id="preview" class="hidden" controls></audio>
  <button class="btn-send hidden" id="sendBtn" onclick="sendAudio()">✔ 停止並送出</button>
  <button class="btn-retry hidden" id="retryBtn" onclick="resetRecording()">重新錄音</button>

  <div class="status" id="status"></div>
  <a class="hidden" id="downloadLink" style="color:var(--brass); font-size:13px; margin-top:10px;">⬇ 下載錄音檔確認</a>

<script>
  let mediaRecorder = null;
  let audioChunks = [];
  let audioBlob = null;
  let stream = null;
  let recordedMimeType = 'audio/webm';

  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get('session') || '';
  const targetUrl = urlParams.get('target') || '';
  const recorderName = urlParams.get('name') || '';

  function pickSupportedMimeType(){
    // iPhone Safari 實際上不支援錄成 webm，會用 mp4/AAC 之類的格式。
    // 依序試探瀏覽器真正支援錄音的格式，不要寫死。
    const candidates = [
      'audio/mp4',
      'audio/mp4;codecs=mp4a.40.2',
      'audio/webm',
      'audio/webm;codecs=opus',
      'audio/ogg',
      'audio/wav'
    ];
    if(window.MediaRecorder && MediaRecorder.isTypeSupported){
      for(const type of candidates){
        if(MediaRecorder.isTypeSupported(type)) return type;
      }
    }
    return ''; // 交給瀏覽器自己決定
  }

  function setStatus(msg, isError){
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  async function startRecording(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(err){
      setStatus('無法取得麥克風權限：' + err.message + '（請確認瀏覽器/系統設定已允許此網站使用麥克風）', true);
      return;
    }
    audioChunks = [];
    const chosenType = pickSupportedMimeType();
    mediaRecorder = chosenType ? new MediaRecorder(stream, {mimeType: chosenType}) : new MediaRecorder(stream);
    // 以 MediaRecorder 實際採用的格式為準（有些瀏覽器會忽略指定值，改用自己的預設值）
    recordedMimeType = mediaRecorder.mimeType || chosenType || 'audio/webm';
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start();

    document.getElementById('dot').classList.add('recording');
    document.getElementById('startBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
    setStatus('錄音中...（格式：' + recordedMimeType + '）');
  }

  function stopRecording(){
    if(mediaRecorder && mediaRecorder.state !== 'inactive'){
      mediaRecorder.stop();
    }
    if(stream){
      stream.getTracks().forEach(t => t.stop());
    }
    document.getElementById('dot').classList.remove('recording');
    document.getElementById('stopBtn').classList.add('hidden');
  }

  function onRecordingStop(){
    audioBlob = new Blob(audioChunks, {type: recordedMimeType});
    const url = URL.createObjectURL(audioBlob);
    const preview = document.getElementById('preview');
    preview.src = url;
    preview.classList.remove('hidden');
    document.getElementById('sendBtn').classList.remove('hidden');
    document.getElementById('retryBtn').classList.remove('hidden');
    setStatus('錄音完成，可以先試聽，確認沒問題後按「停止並送出」');
  }

  function resetRecording(){
    audioBlob = null;
    document.getElementById('preview').classList.add('hidden');
    document.getElementById('sendBtn').classList.add('hidden');
    document.getElementById('retryBtn').classList.add('hidden');
    document.getElementById('startBtn').classList.remove('hidden');
    setStatus('');
  }

  function sendAudio(){
    if(!audioBlob){ setStatus('沒有錄音內容', true); return; }

    if(!sessionId || !targetUrl){
      // 沒有從主 App 帶入必要參數：代表這是獨立測試（例如直接貼網址開啟），不是從主頁面「直接錄音」按鈕跳出來的
      // 這種情況下不知道要上傳去哪，改成提供下載連結方便確認錄音有沒有正常
      setStatus('這是獨立開啟的測試模式，缺少主 App 帶入的參數，無法自動上傳。已提供下載連結，可下載確認錄音正常；正式使用請從主 App 的「直接錄音」按鈕開啟本頁。', true);
      const dl = document.getElementById('downloadLink');
      dl.href = URL.createObjectURL(audioBlob);
      dl.download = 'test-recording.' + (recordedMimeType.split('/')[1] || 'audio').split(';')[0];
      dl.classList.remove('hidden');
      return;
    }

    setStatus('傳送中，AI 分析可能需要幾秒到十幾秒，請稍候...');
    document.getElementById('sendBtn').disabled = true;

    const reader = new FileReader();
    reader.onloadend = () => {
      const base64 = String(reader.result).split(',')[1] || '';
      // 直接把錄音 POST 給 Apps Script 後端，伺服器端會立刻完成分析並暫存結果，
      // 不透過分頁之間傳訊息，避開 window.opener 失效與 iOS 背景分頁節流的問題。
      // Content-Type 用 text/plain 是刻意的：可以避開瀏覽器的 CORS 預檢請求（preflight），
      // 讓這個 POST 屬於「簡單請求」，即使讀不到回應內容，後端還是會確實收到並執行。
      fetch(targetUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'uploadBridgeAudio',
          sessionId: sessionId,
          base64Data: base64,
          mimeType: recordedMimeType,
          recorderName: recorderName
        })
      }).then(()=>{
        setStatus('已送出，主頁面正在等候分析結果，這個視窗可以關閉了');
        setTimeout(()=>{ window.close(); }, 1200);
      }).catch((err)=>{
        document.getElementById('sendBtn').disabled = false;
        setStatus('傳送失敗，請檢查網路連線後再按一次「停止並送出」：' + err.message, true);
      });
    };
    reader.readAsDataURL(audioBlob);
  }

  window.addEventListener('beforeunload', () => {
    if(stream){ stream.getTracks().forEach(t => t.stop()); }
  });
</script>
</body>
</html>
